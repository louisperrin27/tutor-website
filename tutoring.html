  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    },

    },
    "offers": [
      {
        "@type": "Offer",

      },
      {

      {

      {

      }
    ],
    "hasOfferCatalog": {
      "@type": "OfferCatalog",

      "itemListElement": [
        {
          "@type": "OfferCatalog",

          "itemListElement": {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Free Trial Session"
            }
          }
        },
        {
          "@type": "OfferCatalog",
          "name": "1-to-1 Tutoring",
          "itemListElement": {
            "@type": "Offer",
            "itemOffered": {

              "name": "1-to-1 Tutoring Session"
            }
          }
        },
        {
          "@type": "OfferCatalog",
          "name": "Group Tutoring",
          "itemListElement": {

    "itemListElement": [

</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div data-include="navigation" data-nav-type="standard"></div>

  <main id="main-content" class="container" role="main">

    <!-- Step 1: Choose level -->
    <section id="step1" class="subject-section" aria-labelledby="step1-title">
      <h2 id="step1-title" class="section-title">Choose your level</h2>
      <p class="section-description">All sessions are delivered online via video call.</p>
      <div class="pricing-grid" role="list">
        <button type="button" class="pricing-card" data-level="gcse" aria-label="GCSE"> <h3 class="plan-title">GCSE</h3> <span class="btn btn-primary">Continue</span> </button>
        <button type="button" class="pricing-card" data-level="alevel" aria-label="A Level"> <h3 class="plan-title">A Level</h3> <span class="btn btn-primary">Continue</span> </button>
      </div>
    </section>

    <!-- Step 2: Choose subject (hidden until level chosen) -->
    <section id="step2" class="subject-section" aria-labelledby="step2-title" style="display: none;">
      <h2 id="step2-title" class="section-title">Choose subject</h2>
      <p class="section-description" id="step2-desc"></p>
      <div class="pricing-grid" id="step2-cards" role="list"></div>
      <button type="button" class="btn btn-secondary" id="backToLevel" style="margin-top: 1rem;">Back to level</button>
    </section>

    <!-- Step 3: Choose plan (hidden until subject chosen) -->
    <section id="step3" class="subject-section" aria-labelledby="step3-title" style="display: none;">
      <h2 id="step3-title" class="section-title">Choose plan</h2>
      <p class="section-description" id="step3-desc"></p>
      <div class="pricing-grid pricing-grid-three" role="list" id="step3-cards"></div>
      <button type="button" class="btn btn-secondary" id="backToSubject" style="margin-top: 1rem;">Back to subject</button>
    </section>
  </main>

  <footer role="contentinfo" aria-label="Site footer">
    <p>&copy; 2025 Louis Perrin Tutor. Helping students achieve their potential.</p>
  </footer>

  <!-- Inline styles for new pricing section -->
  <style>
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .pricing-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 15px;
      padding: 2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      text-align: center;
      position: relative;
    }
    .recommended {
      border: 2px solid #28a745;
      box-shadow: 0 4px 12px rgba(40,167,69,0.2);
    }
    .recommended-badge {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #28a745;
      color: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .plan-title {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: #333;
    }
    .plan-subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .plan-price {
      font-size: 2rem;
      color: #28a745;
      margin-bottom: 1rem;
    }
    .plan-price span {
      font-size: 1rem;
      color: #555;
    }
    .plan-features {
      list-style: none;
      padding: 0;
      margin: 0 0 1.5rem 0;
      text-align: left;
    }
    .plan-features li {
      margin-bottom: 0.6rem;
      position: relative;
      padding-left: 1.2rem;
    }
    .plan-features li::before {
      content: "•";
      color: #28a745;
      position: absolute;
      left: 0;
      top: 0;
    }
    .dropdown-container {
      position: relative;
      display: inline-block;
    }
    .book-btn {
      min-width: 200px;
      cursor: pointer;
    }
    .dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      min-width: 240px;
      background: #0047ff;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      overflow: hidden;
      display: none;
    }
    .dropdown-container:hover .dropdown,
    .dropdown-container:focus-within .dropdown {
      display: block;
    }
    .dropdown .option {
      color: #fff;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      outline: none;
    }
    .dropdown .option + .option {
      border-top: 1px solid rgba(255,255,255,0.25);
    }
    .dropdown .option:hover,
    .dropdown .option:focus-visible {
      background: #003ad6;
    }
    .pricing-grid-three { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 768px) { .pricing-grid-three { grid-template-columns: 1fr; } }
    button.pricing-card { cursor: pointer; border: 1px solid #ddd; background: #fff; font: inherit; text-align: center; position: relative; }
    #step3-cards .pricing-card { position: relative; display: block; text-decoration: none; color: inherit; }
  </style>
  <script>
(function() {
  const step1 = document.getElementById('step1');
  const step2 = document.getElementById('step2');
  const step3 = document.getElementById('step3');
  const step2Desc = document.getElementById('step2-desc');
  const step2Cards = document.getElementById('step2-cards');
  const step3Desc = document.getElementById('step3-desc');
  const step3Cards = document.getElementById('step3-cards');
  let chosenLevel = '';
  let chosenSubject = '';

  const subjects = { gcse: [{ key: 'maths', label: 'Maths' }, { key: 'physics', label: 'Physics' }], alevel: [{ key: 'maths', label: 'Maths' }, { key: 'further-maths', label: 'Further Maths' }, { key: 'physics', label: 'Physics' }] };
  const calendarMap = {
    gcse: { maths: { '1to1': 'gcse-maths-1to1', bundle: 'gcse-maths-1to1', group: 'gcse-maths-group' }, physics: { '1to1': 'gcse-physics-1to1', bundle: 'gcse-physics-1to1', group: 'gcse-physics-group' } },
    alevel: { maths: { '1to1': 'alevel-maths-1to1', bundle: 'alevel-maths-1to1', group: 'alevel-maths-group' }, 'further-maths': { '1to1': 'alevel-further-maths-1to1', bundle: 'alevel-further-maths-1to1', group: 'alevel-further-maths-group' }, physics: { '1to1': 'alevel-physics-1to1', bundle: 'alevel-physics-1to1', group: 'alevel-physics-group' } }
  };
  const planMap = { gcse: { '1to1': 'gcse-one_to_one', bundle: 'gcse-maths-bundle', group: 'gcse-group' }, alevel: { '1to1': 'a-level-one_to_one', bundle: 'alevel-maths-bundle', group: 'a-level-group' } };
  const planMapSubject = { gcse: { maths: { bundle: 'gcse-maths-bundle' }, physics: { bundle: 'gcse-physics-bundle' } }, alevel: { maths: { bundle: 'alevel-maths-bundle' }, 'further-maths': { bundle: 'alevel-further-maths-bundle' }, physics: { bundle: 'alevel-physics-bundle' } } };
  const priceMap = { gcse: { '1to1': 35, bundle: 175, group: 20 }, alevel: { '1to1': 45, bundle: 225, group: 25 } };

  step1.querySelectorAll('[data-level]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      chosenLevel = this.getAttribute('data-level');
      step2Desc.textContent = chosenLevel === 'gcse' ? 'Choose a subject for GCSE.' : 'Choose a subject for A Level.';
      step2Cards.innerHTML = subjects[chosenLevel].map(function(s) {
        return '<button type="button" class="pricing-card" data-subject="' + s.key + '" aria-label="' + s.label + '"><h3 class="plan-title">' + s.label + '</h3><span class="btn btn-primary">Continue</span></button>';
      }).join('');
      step2.style.display = 'block';
      step1.style.display = 'none';
      step2Cards.querySelectorAll('[data-subject]').forEach(function(b) {
        b.addEventListener('click', function() {
          chosenSubject = this.getAttribute('data-subject');
          step3Desc.textContent = (chosenLevel === 'gcse' ? 'GCSE' : 'A Level') + ' ' + (subjects[chosenLevel].find(function(x) { return x.key === chosenSubject; }).label) + ' — choose a plan.';
          var plans = [
            { key: '1to1', title: '1-1', subtitle: chosenLevel === 'gcse' ? '£35/hour' : '£45/hour', rec: false },
            { key: 'bundle', title: 'Bundle', subtitle: chosenLevel === 'gcse' ? '£175 for 6 sessions' : '£225 for 6 sessions', rec: true },
            { key: 'group', title: chosenLevel === 'alevel' ? 'A Level Group' : 'Group', subtitle: chosenLevel === 'gcse' ? '£20/hour' : '£25/hour', rec: false }
          ];
          step3Cards.innerHTML = plans.map(function(p) {
            var cls = 'pricing-card' + (p.rec ? ' recommended' : '');
            var badge = p.rec ? '<span class="recommended-badge" aria-hidden="true">Recommended</span>' : '';
            return '<a href="#" class="' + cls + '"><h3 class="plan-title">' + p.title + '</h3>' + badge + '<p class="plan-subtitle">' + p.subtitle + '</p><span class="btn btn-primary">Book now</span></a>';
          }).join('');
          step3Cards.querySelectorAll('a').forEach(function(a, i) {
            a.addEventListener('click', function(e) {
              e.preventDefault();
              var planKey = plans[i].key;
              var cal = calendarMap[chosenLevel][chosenSubject][planKey];
              var planParam = planKey === 'bundle' ? planMapSubject[chosenLevel][chosenSubject].bundle : planMap[chosenLevel][planKey];
              var price = priceMap[chosenLevel][planKey];
              window.location.href = '/calendar.html?calendar=' + encodeURIComponent(cal) + '&plan=' + encodeURIComponent(planParam) + '&price=' + price;
            });
          });
          step3.style.display = 'block';
          step2.style.display = 'none';
        });
      });
    });
  });
  document.getElementById('backToLevel').addEventListener('click', function() { step1.style.display = 'block'; step2.style.display = 'none'; });
  document.getElementById('backToSubject').addEventListener('click', function() { step2.style.display = 'block'; step3.style.display = 'none'; });
})();
  </script>
</body>
</html>
