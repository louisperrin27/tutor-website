<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Favicon and App Icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <!-- Preconnect to external resources for improved performance -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Book your A-Level tutoring session with Louis Perrin. Choose from free trial sessions, 1-to-1 lessons, or group sessions. Flexible online scheduling available.">
  <meta name="keywords" content="book A-Level tutoring, online A-Level tutoring sessions, A-Level maths tutor booking, A-Level physics tutor">
  <meta name="author" content="Louis Perrin">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://louisperrintutor.com/a-level-tutoring-packages.html">
  
  <title>A-Level Tutoring Packages - Louis Perrin Tutor</title>

  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="/client-logger.js"></script>
  <script src="/load-navigation.js" defer></script>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div data-include="navigation" data-nav-type="standard"></div>

  <main id="main-content" class="container" role="main">
    <p class="section-description">Redirecting to booking…</p>
  </main>
  <script>window.location.replace('/tutoring.html');</script>

  <footer role="contentinfo" aria-label="Site footer">
    <p>&copy; 2025 Louis Perrin Tutor. Helping students achieve their potential.</p>
  </footer>

  <!-- Inline styles for pricing section -->
  <style>
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .pricing-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 15px;
      padding: 2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      text-align: center;
      position: relative;
    }
    .recommended {
      border: 2px solid #28a745;
      box-shadow: 0 4px 12px rgba(40,167,69,0.2);
    }
    .recommended-badge {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #28a745;
      color: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .plan-title {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: #333;
    }
    .plan-subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .plan-price {
      font-size: 2rem;
      color: #28a745;
      margin-bottom: 1rem;
    }
    .plan-price span {
      font-size: 1rem;
      color: #555;
    }
    .plan-features {
      list-style: none;
      padding: 0;
      margin: 0 0 1.5rem 0;
      text-align: left;
    }
    .plan-features li {
      margin-bottom: 0.6rem;
      position: relative;
      padding-left: 1.2rem;
    }
    .plan-features li::before {
      content: "•";
      color: #28a745;
      position: absolute;
      left: 0;
      top: 0;
    }
  </style>
</body>
</html>
