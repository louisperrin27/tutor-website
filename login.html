<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Favicon and App Icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <!-- Preconnect to external resources for improved performance -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Sign in to your Louis Perrin Tutor account to access exclusive educational resources and manage your tutoring sessions.">
  <meta name="keywords" content="login, sign in, tutor account, tutoring login">
  <meta name="author" content="Louis Perrin">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://louisperrintutor.com/login.html">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://louisperrintutor.com/login.html">
  <meta property="og:title" content="Sign In - Louis Perrin Tutor">
  <meta property="og:description" content="Sign in to your account to access exclusive educational resources.">
  <meta property="og:site_name" content="Louis Perrin Tutor">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Sign In - Louis Perrin Tutor">
  <meta name="twitter:description" content="Sign in to your account to access exclusive educational resources.">
  
  <title>Sign In - Louis Perrin Tutor</title>

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

  <style>
    body {
      background: var(--background-gray, #f8f9fb);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .login-container {
      background: #fff;
      border-radius: var(--border-radius, 10px);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      text-align: center;
    }

    .login-container h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary, #333);
    }

    .login-container p {
      color: var(--text-secondary, #666);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .login-container button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-container input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: var(--border-radius, 6px);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .field-error {
      display: none;
      color: #c33;
      font-size: 0.85rem;
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
      text-align: left;
    }

    .login-container button {
      width: 100%;
      padding: 0.8rem;
      border: none;
      background: var(--primary-blue, #0056ff);
      color: white;
      font-weight: bold;
      border-radius: var(--border-radius, 6px);
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .login-container button:hover {
      background: var(--primary-blue-hover, #0040d4);
    }

    .success-message {
      display: none;
      margin-top: 1rem;
      color: #28a745;
      font-weight: bold;
    }

    .signup-link {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      font-size: 0.9rem;
      color: var(--text-secondary, #666);
    }

    .signup-link a {
      color: var(--primary-blue, #0056ff);
      text-decoration: none;
      font-weight: 500;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
  <script src="fetch-with-timeout.js"></script>
  <script src="/email-validation.js"></script>
  <script src="/analytics.js" defer></script>
  <script src="/load-navigation.js" defer></script>
</head>

<body>
  <div data-include="navigation" data-nav-type="standard"></div>
  <main role="main">
    <div class="login-container">
      <h1>Sign In</h1>
      <p>Sign in to access exclusive educational resources and manage your account.</p>

      <form id="loginForm" aria-label="Sign in form">
        <label for="email" class="sr-only">Email address</label>
        <input type="email" id="email" placeholder="Email Address" required 
               pattern="[^\s@]+@[^\s@]+\.[^\s@]+" 
               title="Please enter a valid email address (e.g., name@example.com)"
               aria-required="true" 
               aria-describedby="emailError" />
        <span class="field-error email-error" data-field="email" id="emailError" role="alert" aria-live="polite"></span>

        <label for="password" class="sr-only">Password</label>
        <input type="password" id="password" placeholder="Password" required 
               aria-required="true" 
               aria-describedby="passwordError" />
        <span class="field-error" data-field="password" id="passwordError" role="alert" aria-live="polite"></span>

        <button type="submit" aria-label="Sign in">Sign In</button>
        <p id="responseMsg" class="success-message" role="status" aria-live="polite"></p>
      </form>

      <div class="signup-link">
        <a href="/forgot-password.html" style="display: block; margin-bottom: 0.5rem;">Forgot password?</a>
        Don't have an account? <a href="/singup.html">Create an account</a>
      </div>
    </div>
  </main>

  <script src="/form-validation.js" defer></script>
  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("responseMsg");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const submitBtn = form.querySelector('button[type="submit"]');
      
      // Hide previous messages and clear errors
      msg.style.display = "none";
      if (emailError) emailError.style.display = "none";
      if (passwordError) passwordError.style.display = "none";
      
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";
      }

      // Validate email using shared validation
      if (!isValidEmail(email)) {
        if (emailError) {
          emailError.textContent = 'Please enter a valid email address (e.g., name@example.com)';
          emailError.style.display = 'block';
        }
        emailInput.setAttribute('aria-invalid', 'true');
        emailInput.classList.add('invalid');
        msg.style.display = "block";
        msg.style.color = "#c33";
        msg.textContent = "Please enter a valid email address.";
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        emailInput.focus();
        return;
      }
      if (emailError) emailError.style.display = 'none';
      emailInput.setAttribute('aria-invalid', 'false');
      emailInput.classList.remove('invalid');

      // Validate password
      if (!password || password.length < 1) {
        if (passwordError) {
          passwordError.textContent = "Password is required.";
          passwordError.style.display = "block";
        }
        passwordInput.setAttribute('aria-invalid', 'true');
        passwordInput.classList.add('invalid');
        msg.style.display = "block";
        msg.style.color = "#c33";
        msg.textContent = "Password is required.";
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        passwordInput.focus();
        return;
      }
      if (passwordError) passwordError.style.display = "none";
      passwordInput.setAttribute('aria-invalid', 'false');
      passwordInput.classList.remove('invalid');

      try {
        const res = await fetchWithTimeout("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        }, 10000);

        if (!res.ok) {
          let errorMessage = "Login failed. Please try again.";
          try {
            const errorData = await res.json();
            errorMessage = errorData.message || errorMessage;
          } catch {
            if (res.status === 401) {
              errorMessage = "Invalid email or password. Please check your credentials and try again.";
            } else if (res.status === 429) {
              errorMessage = "Too many login attempts. Please try again later.";
            } else if (res.status >= 500) {
              errorMessage = "Server error. Please try again later.";
            }
          }
          throw new Error(errorMessage);
        }

        let data;
        try {
          data = await res.json();
        } catch (jsonErr) {
          throw new Error("Invalid response from server. Please try again.");
        }

        // Login successful - redirect to account page
        if (data.user) {
          msg.style.display = "block";
          msg.style.color = "#28a745";
          msg.textContent = "Login successful! Redirecting...";
          // Redirect to account page after short delay
          setTimeout(() => {
            window.location.href = "account.html";
          }, 500);
        } else {
          throw new Error("Login successful but no user data received.");
        }
      } catch (err) {
        msg.style.display = "block";
        msg.style.color = "#c33";
        if (err.name === 'TimeoutError' || err.message.includes('timed out')) {
          msg.textContent = 'Request timed out. Please check your internet connection and try again.';
        } else if (err.message && err.message.includes("Failed to fetch")) {
          msg.textContent = "Unable to connect to the server. Please check your internet connection and try again.";
        } else {
          msg.textContent = err.message || "Login failed. Please try again.";
        }
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
      }
    });

    // Add real-time email validation
    if (emailInput && emailError) {
      emailInput.addEventListener('blur', function() {
        validateEmailInput(emailInput, emailError);
      });
      emailInput.addEventListener('input', function() {
        if (this.value.trim().length > 0) {
          validateEmailInput(emailInput, emailError);
        } else {
          emailError.style.display = 'none';
          this.classList.remove('valid', 'invalid');
        }
      });
    }
  </script>
</body>
</html>
