<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Favicon and App Icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <!-- Preconnect to external resources for improved performance -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Reset your password for your Louis Perrin Tutor account.">
  <meta name="keywords" content="password reset, change password">
  <meta name="author" content="Louis Perrin">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://louisperrintutor.com/reset-password">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://louisperrintutor.com/reset-password">
  <meta property="og:title" content="Reset Password - Louis Perrin Tutor">
  <meta property="og:description" content="Reset your password for your account.">
  <meta property="og:site_name" content="Louis Perrin Tutor">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Reset Password - Louis Perrin Tutor">
  <meta name="twitter:description" content="Reset your password for your account.">
  
  <title>Reset Password - Louis Perrin Tutor</title>

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

  <style>
    body {
      background: var(--background-gray, #f8f9fb);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .reset-password-container {
      background: #fff;
      border-radius: var(--border-radius, 10px);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      text-align: center;
    }

    .reset-password-container h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary, #333);
    }

    .reset-password-container p {
      color: var(--text-secondary, #666);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .reset-password-container button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .reset-password-container input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: var(--border-radius, 6px);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .field-error {
      display: none;
      color: #c33;
      font-size: 0.85rem;
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
      text-align: left;
    }

    .reset-password-container button {
      width: 100%;
      padding: 0.8rem;
      border: none;
      background: var(--primary-blue, #0056ff);
      color: white;
      font-weight: bold;
      border-radius: var(--border-radius, 6px);
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .reset-password-container button:hover {
      background: var(--primary-blue-hover, #0040d4);
    }

    .success-message {
      display: none;
      margin-top: 1rem;
      color: #28a745;
      font-weight: bold;
    }

    .back-link {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      font-size: 0.9rem;
      color: var(--text-secondary, #666);
    }

    .back-link a {
      color: var(--primary-blue, #0056ff);
      text-decoration: none;
      font-weight: 500;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
  <script src="/fetch-with-timeout.js"></script>
  <script src="/analytics.js" defer></script>
  <script src="/load-navigation.js" defer></script>
</head>

<body>
  <div data-include="navigation" data-nav-type="standard"></div>
  <main role="main">
    <div class="reset-password-container">
      <h1>Reset Password</h1>
      <p>Enter your new password below.</p>

      <form id="resetPasswordForm" aria-label="Reset password form">
        <input type="hidden" id="token" name="token" />
        
        <label for="password" class="sr-only">New Password</label>
        <input type="password" id="password" placeholder="New Password" required 
               minlength="8"
               title="Password must be at least 8 characters long"
               aria-required="true" 
               aria-describedby="passwordError" />
        <span class="field-error" data-field="password" id="passwordError" role="alert" aria-live="polite"></span>

        <label for="confirmPassword" class="sr-only">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required 
               minlength="8"
               title="Passwords must match"
               aria-required="true" 
               aria-describedby="confirmPasswordError" />
        <span class="field-error" data-field="confirmPassword" id="confirmPasswordError" role="alert" aria-live="polite"></span>

        <button type="submit" aria-label="Reset password">Reset Password</button>
        <p id="responseMsg" class="success-message" role="status" aria-live="polite"></p>
      </form>

      <div class="back-link">
        <a href="/login.html">← Back to Sign In</a>
      </div>
    </div>
  </main>

  <script>
    // Wait for DOM and scripts to load
    document.addEventListener('DOMContentLoaded', function() {
      // Extract token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const tokenInput = document.getElementById('token');
      if (token) {
        tokenInput.value = token;
      }

      const form = document.getElementById("resetPasswordForm");
      const msg = document.getElementById("responseMsg");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const passwordError = document.getElementById("passwordError");
      const confirmPasswordError = document.getElementById("confirmPasswordError");
      const submitBtn = form.querySelector('button[type="submit"]');

      // Fallback to regular fetch if fetchWithTimeout is not available
      const safeFetch = (url, options, timeout = 10000) => {
        if (typeof fetchWithTimeout === 'function') {
          return fetchWithTimeout(url, options, timeout);
        }
        // Fallback to regular fetch with AbortController for timeout
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        return fetch(url, { ...options, signal: controller.signal })
          .catch(err => {
            // Improve error messages for Safari
            if (err.name === 'AbortError') {
              const timeoutError = new Error('Request timed out. Please check your internet connection and try again.');
              timeoutError.name = 'TimeoutError';
              throw timeoutError;
            }
            // Safari may throw "Load failed" or "Failed to load resource"
            if (err.message && (err.message.includes('Load failed') || err.message.includes('Failed to load'))) {
              const networkError = new Error('Unable to connect to the server. Please check your internet connection and try again.');
              networkError.name = 'NetworkError';
              throw networkError;
            }
            throw err;
          })
          .finally(() => clearTimeout(timeoutId));
      };

      form.addEventListener("submit", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const resetToken = tokenInput.value;
      
      // Hide previous messages and clear errors
      msg.style.display = "none";
      if (passwordError) passwordError.style.display = "none";
      if (confirmPasswordError) confirmPasswordError.style.display = "none";
      
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = "Resetting...";
      }

      // Validate token
      if (!resetToken) {
        msg.style.display = "block";
        msg.style.color = "#c33";
        msg.textContent = "Invalid reset link. Please request a new password reset.";
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Reset Password";
        }
        return;
      }

      // Validate password
      if (!password || password.length < 8) {
        if (passwordError) {
          passwordError.textContent = "Password must be at least 8 characters long.";
          passwordError.style.display = "block";
        }
        passwordInput.setAttribute('aria-invalid', 'true');
        passwordInput.classList.add('invalid');
        msg.style.display = "block";
        msg.style.color = "#c33";
        msg.textContent = "Password must be at least 8 characters long.";
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Reset Password";
        }
        passwordInput.focus();
        return;
      }
      
      if (passwordError) passwordError.style.display = "none";
      passwordInput.setAttribute('aria-invalid', 'false');
      passwordInput.classList.remove('invalid');

      // Validate password match
      if (password !== confirmPassword) {
        if (confirmPasswordError) {
          confirmPasswordError.textContent = "Passwords do not match.";
          confirmPasswordError.style.display = "block";
        }
        confirmPasswordInput.setAttribute('aria-invalid', 'true');
        confirmPasswordInput.classList.add('invalid');
        msg.style.display = "block";
        msg.style.color = "#c33";
        msg.textContent = "Passwords do not match.";
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Reset Password";
        }
        confirmPasswordInput.focus();
        return;
      }
      
      if (confirmPasswordError) confirmPasswordError.style.display = "none";
      confirmPasswordInput.setAttribute('aria-invalid', 'false');
      confirmPasswordInput.classList.remove('invalid');

      try {
        const res = await safeFetch("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: resetToken, password, confirmPassword }),
        }, 10000);

        if (!res.ok) {
          let errorMessage = "Something went wrong. Please try again.";
          try {
            const errorData = await res.json();
            errorMessage = errorData.message || errorMessage;
          } catch {
            if (res.status === 400) {
              errorMessage = "Invalid or expired reset token. Please request a new password reset.";
            } else if (res.status === 429) {
              errorMessage = "Too many requests. Please try again later.";
            } else if (res.status >= 500) {
              errorMessage = "Server error. Please try again later.";
            }
          }
          throw new Error(errorMessage);
        }

        const data = await res.json();
        
        // Show success message
        msg.style.display = "block";
        msg.style.color = "#28a745";
        msg.textContent = data.message || "Password reset successfully! Redirecting to login...";
        
        // Redirect to login after delay
        setTimeout(() => {
          window.location.href = data.redirectTo || '/login.html';
        }, 2000);
      } catch (err) {
        msg.style.display = "block";
        msg.style.color = "#c33";
        
        // Handle different error types
        let errorMessage = "Failed to reset password. Please try again.";
        
        if (err.name === 'TimeoutError' || err.message && err.message.includes('timed out')) {
          errorMessage = 'Request timed out. Please check your internet connection and try again.';
        } else if (err.name === 'AbortError') {
          errorMessage = "Request was cancelled. Please try again.";
        } else if (err.name === 'NetworkError') {
          errorMessage = "Unable to connect to the server. Please check your internet connection and try again.";
        } else if (err.message && (err.message.includes("Failed to fetch") || err.message.includes("Load failed") || err.message.includes("Failed to load"))) {
          errorMessage = "Unable to connect to the server. Please check your internet connection and try again.";
        } else if (err.message) {
          errorMessage = err.message;
        }
        
        msg.textContent = errorMessage;
        
        // Log error for debugging with more details
        console.error('Password reset error:', {
          name: err.name,
          message: err.message,
          stack: err.stack,
          url: window.location.href,
          token: resetToken ? 'present' : 'missing'
        });
        
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Reset Password";
        }
      }
    });
    }); // End DOMContentLoaded
  </script>
</body>
</html>
