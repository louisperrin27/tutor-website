<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Favicon and App Icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <title>Admin Home - Louis Perrin Tutor</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { 
      background: var(--background-gray); 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .home-container {
      max-width: 500px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      padding: var(--spacing-xl, 2rem);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .home-container h1 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: var(--text-primary, #333);
    }
    .admin-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .admin-actions .btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
    }
  </style>
  <script src="fetch-with-timeout.js"></script>
</head>
<body>
  <div class="home-container">
    <h1>Admin Home</h1>
    <div class="admin-actions" role="group" aria-label="Admin navigation">
      <a href="/admin.html" class="btn btn-primary">Manage Slots</a>
      <a href="/admin-mailing-list.html" class="btn btn-secondary">View Mailing List</a>
    </div>
  </div>

  <script>
    // Check if admin is authenticated, redirect to login if not
    (async () => {
      try {
        const res = await fetchWithTimeout('/admin/check-auth', {}, 5000);
        if (!res.ok) {
          window.location.href = '/admin-login.html';
        }
      } catch (err) {
        window.location.href = '/admin-login.html';
      }
    })();
  </script>
</body>
</html>
